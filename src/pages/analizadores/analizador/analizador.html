<div class="container-fluid p-3">
  <div class="row g-3">

    <!-- Panel izquierdo -->
    <div class="col-md-4">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-primary text-white fw-semibold">
          🔍 Analizador LL
        </div>
        <div class="card-body d-flex flex-column gap-3">

          <!-- Selector -->
          <div>
            <label class="form-label fw-semibold">Seleccionar analizador</label>
            <select class="form-select" [(ngModel)]="analizadorSeleccionado">
              <option value="">-- Seleccione --</option>
              <option *ngFor="let a of servicio.analizadores" [value]="a.nombre">
                {{ a.nombre }}
              </option>
            </select>
            <small class="text-muted" *ngIf="servicio.analizadores.length === 0">
              ⚠ No hay analizadores creados. Ve al
              <a routerLink="/editor">Editor</a> primero.
            </small>
          </div>

          <!-- Cadena de entrada -->
          <div>
            <label class="form-label fw-semibold">Cadena de entrada</label>
            <textarea class="form-control font-monospace" rows="5"
              [(ngModel)]="cadenaEntrada"
              placeholder="Tokens separados por espacios…"></textarea>
            <small class="text-muted">
              Ej: <code>$_P_Ab $_Una_A $_Mas $_Una_A $_P_Ce $_FIN</code>
            </small>
          </div>

          <button class="btn btn-primary fw-semibold"
            (click)="analizar()"
            [disabled]="!analizadorSeleccionado || !cadenaEntrada.trim()">
            ▶ Analizar cadena
          </button>

          <!-- Resultado -->
          <div *ngIf="resultado !== null">
            <div class="alert fw-semibold py-2"
              [class.alert-success]="resultado.aceptada"
              [class.alert-danger]="!resultado.aceptada">
              {{ resultado.aceptada ? '✅ Cadena aceptada' : '❌ Cadena rechazada' }}
            </div>

            <div *ngIf="resultado.errores.length > 0">
              <p class="fw-semibold mb-1 small">Detalles del error:</p>
              <ul class="list-group">
                <li class="list-group-item list-group-item-danger small"
                  *ngFor="let e of resultado.errores">
                  ⚠ {{ e }}
                </li>
              </ul>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Panel derecho: árbol -->
    <div class="col-md-8">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-success text-white fw-semibold">
          🌳 Árbol de derivación
        </div>
        <div class="card-body" style="overflow:auto; background:#f0f4f8; min-height:400px;">
          <app-arbol [raiz]="arbol"></app-arbol>
        </div>
      </div>
    </div>

  </div>
</div>
