<!-- arbol.html -->
<div class="container-fluid p-3">
  <div class="d-flex align-items-center gap-2 mb-3">
    <button [routerLink]="['/editor']" class="btn btn-outline-secondary btn-sm">← Volver</button>
    <h2 class="mb-0 fw-bold">Árbol de Derivación</h2>
  </div>

  <div class="row g-3">

    <!-- Panel de configuración -->
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white fw-semibold">
          ⚙️ Configuración
        </div>
        <div class="card-body d-flex flex-column gap-3">

          <div>
            <label class="form-label fw-semibold">Analizador</label>
            <select class="form-select" [(ngModel)]="analizadorSeleccionado">
              <option value="">-- Seleccione --</option>
              <option *ngFor="let a of analizadores" [value]="a">{{ a }}</option>
            </select>
          </div>

          <div>
            <label class="form-label fw-semibold">Cadena de entrada</label>
            <textarea class="form-control font-monospace" rows="5" [(ngModel)]="cadenaEntrada"
              placeholder="Tokens separados por espacios…"></textarea>
            <small class="text-muted">Ej: <code>$_P_Ab $_Una_A $_Mas $_Una_A $_P_Ce $_FIN</code></small>
          </div>

          <button class="btn btn-primary" (click)="analizar()"
            [disabled]="!analizadorSeleccionado || !cadenaEntrada.trim()">
            ▶ Analizar cadena
          </button>

          <!-- Resultado -->
          <div *ngIf="resultado">
            <div class="alert fw-semibold py-2" [class.alert-success]="resultado.aceptada"
              [class.alert-danger]="!resultado.aceptada">
              {{ resultado.aceptada ? '✅ Cadena aceptada' : '❌ Cadena rechazada' }}
            </div>
            <ul *ngIf="resultado.errores.length > 0" class="list-group">
              <li *ngFor="let e of resultado.errores" class="list-group-item list-group-item-danger small">
                ⚠ {{ e }}
              </li>
            </ul>
          </div>

        </div>
      </div>

      <!-- Leyenda -->
      <div class="card mt-3 shadow-sm">
        <div class="card-body d-flex gap-4 small py-2">
          <span class="d-flex align-items-center gap-2">
            <span style="display:inline-block;width:16px;height:16px;border-radius:50%;background:#0d6efd;"></span>
            No terminal
          </span>
          <span class="d-flex align-items-center gap-2">
            <span style="display:inline-block;width:16px;height:16px;border-radius:50%;background:#198754;"></span>
            Terminal / Hoja
          </span>
        </div>
      </div>
    </div>

    <!-- Panel SVG del árbol -->
    <div class="col-md-8">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-success text-white fw-semibold">
          🌳 Árbol de derivación
        </div>
        <div class="card-body p-2"
          style="overflow: auto; background: #f0f4f8; min-height: 400px; border-radius: 0 0 8px 8px;">

          <!-- Placeholder -->
          <div *ngIf="!arbol" class="text-muted text-center d-flex flex-column align-items-center
               justify-content-center" style="min-height:350px; opacity:.5;">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="15" r="12" fill="#adb5bd" />
              <line x1="40" y1="27" x2="20" y2="45" stroke="#adb5bd" stroke-width="2" />
              <line x1="40" y1="27" x2="60" y2="45" stroke="#adb5bd" stroke-width="2" />
              <circle cx="20" cy="55" r="10" fill="#ced4da" />
              <circle cx="60" cy="55" r="10" fill="#ced4da" />
            </svg>
            <p class="mt-3">Ingresa una cadena válida para ver el árbol</p>
          </div>

          <!-- SVG del árbol -->
          <svg *ngIf="arbol" [attr.width]="svgWidth" [attr.height]="svgHeight"
            style="font-family: 'Consolas', monospace; display:block;">

            <!-- Definición del filtro sombra -->
            <defs>
              <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15" />
              </filter>
            </defs>

            <!-- Líneas de conexión -->
            <line *ngFor="let l of lineas" [attr.x1]="l.x1" [attr.y1]="l.y1" [attr.x2]="l.x2" [attr.y2]="l.y2"
              stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="none" />

            <!-- Nodos -->
            <g *ngFor="let n of nodos" filter="url(#shadow)">

              <!-- Círculo exterior (borde) -->
              <circle [attr.cx]="n.x" [attr.cy]="n.y" [attr.r]="radio + 2"
                [attr.fill]="n.esHoja ? '#0f5132' : '#084298'" opacity="0.25" />

              <!-- Círculo principal -->
              <circle [attr.cx]="n.x" [attr.cy]="n.y" [attr.r]="radio" [attr.fill]="n.esHoja ? '#198754' : '#0d6efd'"
                stroke="white" stroke-width="2" />

              <!-- Texto del nodo -->
              <text [attr.x]="n.x" [attr.y]="n.y + 4" text-anchor="middle" fill="white" font-size="10"
                font-weight="bold" letter-spacing="0.3">
                {{ n.label.length > 9 ? n.label.slice(0, 8) + '…' : n.label }}
              </text>

              <!-- Tooltip -->
              <title>{{ n.label }}</title>

            </g>

          </svg>

        </div>
      </div>
    </div>

  </div>
</div>
